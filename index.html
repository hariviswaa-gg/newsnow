<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>NewsNow — World · India · Tamil Nadu</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0f0f1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="NewsNow" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ─── RESET & BASE ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0f0f1a;
      --surface:    #181828;
      --surface2:   #1e1e32;
      --border:     rgba(255,255,255,0.07);
      --gold:       #f5a623;
      --gold-dim:   rgba(245,166,35,0.15);
      --world:      #4fc3f7;
      --india:      #ff7043;
      --tn:         #66bb6a;
      --text:       #e8e8f0;
      --text-muted: #7070a0;
      --radius:     14px;
      --card-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── BACKGROUND AMBIENT ──────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      top: -200px; left: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(79,195,247,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -200px; right: -200px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(245,166,35,0.05) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ─── HEADER ──────────────────────────────────────────────── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(15,15,26,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
    }
    .header-inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      gap: 12px;
    }
    .logo {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none;
    }
    .logo-mark {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--gold), #ff6b35);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      box-shadow: 0 0 20px rgba(245,166,35,0.3);
    }
    .logo-text {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 900;
      color: var(--text);
      letter-spacing: -0.5px;
    }
    .logo-text span { color: var(--gold); }

    .header-right {
      display: flex; align-items: center; gap: 10px;
    }
    #last-updated {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
    }
    #refresh-btn {
      width: 36px; height: 36px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      transition: all 0.2s;
    }
    #refresh-btn:hover { color: var(--gold); border-color: var(--gold); }
    #refresh-btn.spinning { animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #notif-btn {
      padding: 0 14px; height: 36px;
      background: var(--gold-dim);
      border: 1px solid rgba(245,166,35,0.3);
      border-radius: 10px;
      color: var(--gold);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
      display: flex; align-items: center; gap: 6px;
    }
    #notif-btn:hover { background: rgba(245,166,35,0.25); }
    #notif-btn.granted {
      background: rgba(102,187,106,0.1);
      border-color: rgba(102,187,106,0.3);
      color: var(--tn);
    }

    /* ─── LIVE TICKER ─────────────────────────────────────────── */
    .ticker-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      overflow: hidden;
      height: 36px;
      display: flex;
      align-items: center;
    }
    .ticker-label {
      background: var(--gold);
      color: #000;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 0 14px;
      height: 100%;
      display: flex;
      align-items: center;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .ticker-track {
      flex: 1;
      overflow: hidden;
      position: relative;
    }
    .ticker-content {
      display: flex;
      white-space: nowrap;
      animation: ticker 60s linear infinite;
    }
    .ticker-content:hover { animation-play-state: paused; }
    @keyframes ticker {
      0%   { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }
    .ticker-item {
      font-size: 12px;
      color: var(--text-muted);
      padding: 0 28px;
    }
    .ticker-item span { color: var(--text); }

    /* ─── TABS ────────────────────────────────────────────────── */
    .tabs-wrap {
      position: sticky;
      top: 64px;
      z-index: 99;
      background: rgba(15,15,26,0.9);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .tabs {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      padding: 0 20px;
    }
    .tab-btn {
      padding: 16px 24px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.3px;
      color: var(--text-muted);
      background: none;
      border: none;
      cursor: pointer;
      position: relative;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }
    .tab-btn::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      border-radius: 2px 2px 0 0;
      transform: scaleX(0);
      transition: transform 0.2s;
    }
    .tab-btn[data-tab="world"]::after  { background: var(--world); }
    .tab-btn[data-tab="india"]::after  { background: var(--india); }
    .tab-btn[data-tab="tn"]::after     { background: var(--tn); }

    .tab-btn.active { color: var(--text); }
    .tab-btn.active::after { transform: scaleX(1); }
    .tab-btn[data-tab="world"].active  { color: var(--world); }
    .tab-btn[data-tab="india"].active  { color: var(--india); }
    .tab-btn[data-tab="tn"].active     { color: var(--tn); }

    .tab-badge {
      background: var(--surface2);
      border-radius: 20px;
      font-size: 10px;
      padding: 2px 7px;
      color: var(--text-muted);
    }

    /* ─── MAIN CONTENT ────────────────────────────────────────── */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 20px 80px;
      position: relative;
      z-index: 1;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ─── SECTION HEADER ─────────────────────────────────────── */
    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .section-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .world-dot  { background: var(--world);  box-shadow: 0 0 8px var(--world); }
    .india-dot  { background: var(--india);  box-shadow: 0 0 8px var(--india); }
    .tn-dot     { background: var(--tn);     box-shadow: 0 0 8px var(--tn); }
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -0.5px;
    }
    .section-count {
      margin-left: auto;
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ─── NEWS GRID ───────────────────────────────────────────── */
    .news-grid {
      display: grid;
      gap: 16px;
    }

    /* ─── HERO CARD (first article) ───────────────────────────── */
    .card-hero {
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: var(--card-shadow);
      text-decoration: none;
      color: inherit;
      display: block;
      position: relative;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .card-hero:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    }
    .card-hero .card-img {
      width: 100%;
      height: 240px;
      object-fit: cover;
      display: block;
    }
    .card-hero .card-img-placeholder {
      width: 100%;
      height: 240px;
      background: linear-gradient(135deg, var(--surface2), var(--surface));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      opacity: 0.3;
    }
    .card-hero .card-body {
      padding: 20px;
    }
    .card-tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 10px;
    }
    .world-tag  { background: rgba(79,195,247,0.15);  color: var(--world); }
    .india-tag  { background: rgba(255,112,67,0.15);  color: var(--india); }
    .tn-tag     { background: rgba(102,187,106,0.15); color: var(--tn); }

    .card-hero .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 12px;
      color: var(--text);
    }
    .card-hero .card-summary {
      font-size: 14px;
      line-height: 1.7;
      color: var(--text-muted);
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 14px;
    }
    .card-source {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .card-time {
      font-size: 11px;
      color: var(--text-muted);
      margin-left: auto;
    }
    .new-badge {
      background: var(--india);
      color: white;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 2px 7px;
      border-radius: 4px;
      text-transform: uppercase;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* ─── SMALL CARD ──────────────────────────────────────────── */
    .card-small {
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: var(--card-shadow);
      text-decoration: none;
      color: inherit;
      display: grid;
      grid-template-columns: 1fr 100px;
      gap: 0;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .card-small:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }
    .card-small .card-body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .card-small .card-title {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.4;
      color: var(--text);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-small .card-summary {
      font-size: 12px;
      line-height: 1.6;
      color: var(--text-muted);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-small .card-meta { margin-top: auto; }
    .card-small .card-thumb {
      width: 100px;
      object-fit: cover;
      align-self: stretch;
      flex-shrink: 0;
    }
    .card-small .card-thumb-placeholder {
      width: 100px;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      opacity: 0.25;
    }

    /* ─── SKELETON LOADER ─────────────────────────────────────── */
    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    .skeleton {
      background: linear-gradient(90deg,
        var(--surface) 25%,
        var(--surface2) 37%,
        var(--surface) 63%
      );
      background-size: 800px 100%;
      animation: shimmer 1.6s infinite;
      border-radius: 8px;
    }
    .skel-hero {
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--surface);
      border: 1px solid var(--border);
      margin-bottom: 16px;
    }
    .skel-hero .skel-img   { height: 240px; }
    .skel-hero .skel-body  { padding: 20px; }
    .skel-hero .skel-tag   { height: 20px; width: 80px; margin-bottom: 12px; }
    .skel-hero .skel-title { height: 28px; margin-bottom: 8px; }
    .skel-hero .skel-title2 { height: 28px; width: 70%; margin-bottom: 14px; }
    .skel-hero .skel-line  { height: 14px; margin-bottom: 8px; }
    .skel-small {
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid var(--border);
      display: grid;
      grid-template-columns: 1fr 100px;
      overflow: hidden;
      margin-bottom: 16px;
      height: 110px;
    }
    .skel-small .skel-body { padding: 16px; }

    /* ─── ERROR STATE ─────────────────────────────────────────── */
    .error-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .error-state .icon { font-size: 48px; margin-bottom: 16px; }
    .error-state h3 { font-size: 18px; margin-bottom: 8px; color: var(--text); }
    .error-state p  { font-size: 13px; }
    .retry-btn {
      margin-top: 20px;
      padding: 10px 24px;
      background: var(--gold-dim);
      border: 1px solid rgba(245,166,35,0.3);
      border-radius: 8px;
      color: var(--gold);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    /* ─── INSTALL BANNER ──────────────────────────────────────── */
    #install-banner {
      position: fixed;
      bottom: 20px; left: 20px; right: 20px;
      background: var(--surface2);
      border: 1px solid rgba(245,166,35,0.3);
      border-radius: var(--radius);
      padding: 16px 18px;
      display: none;
      align-items: center;
      gap: 14px;
      z-index: 999;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
      max-width: 500px;
      margin: 0 auto;
    }
    #install-banner.show { display: flex; }
    .install-icon { font-size: 28px; flex-shrink: 0; }
    .install-text h4 { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
    .install-text p  { font-size: 12px; color: var(--text-muted); }
    .install-actions { display: flex; gap: 8px; margin-left: auto; flex-shrink: 0; }
    .btn-install {
      padding: 8px 16px;
      background: var(--gold);
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-dismiss {
      padding: 8px 12px;
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
    }

    /* ─── LIVE INDICATOR ──────────────────────────────────────── */
    .live-dot {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 600;
      color: #f44336;
      letter-spacing: 0.5px;
    }
    .live-dot::before {
      content: '';
      width: 6px; height: 6px;
      background: #f44336;
      border-radius: 50%;
      animation: blink 1.2s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ─── TOAST NOTIFICATION ──────────────────────────────────── */
    #toast {
      position: fixed;
      top: 80px; right: 20px;
      background: var(--surface2);
      border: 1px solid rgba(102,187,106,0.3);
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 13px;
      color: var(--tn);
      transform: translateX(120%);
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 9999;
      max-width: 280px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    #toast.show { transform: translateX(0); }

    /* ─── RESPONSIVE ──────────────────────────────────────────── */
    @media (min-width: 640px) {
      .news-grid { grid-template-columns: 1fr; }
      .card-hero .card-img { height: 320px; }
      .card-hero .card-title { font-size: 26px; }
    }
    @media (max-width: 420px) {
      .tab-btn { padding: 14px 16px; font-size: 12px; }
      .card-hero .card-title { font-size: 18px; }
      #last-updated { display: none; }
    }
  </style>
</head>
<body>

  <!-- ─── HEADER ──────────────────────────────────────────────── -->
  <header>
    <div class="header-inner">
      <a class="logo" href="#">
        <div class="logo-mark">📰</div>
        <div class="logo-text">News<span>Now</span></div>
      </a>
      <div class="header-right">
        <span id="last-updated"></span>
        <button id="notif-btn" onclick="requestNotifications()">🔔 Notify Me</button>
        <button id="refresh-btn" title="Refresh news" onclick="refreshAll()">↻</button>
      </div>
    </div>
  </header>

  <!-- ─── LIVE TICKER ──────────────────────────────────────────── -->
  <div class="ticker-bar">
    <div class="ticker-label">LIVE</div>
    <div class="ticker-track">
      <div class="ticker-content" id="ticker-content">
        <span class="ticker-item">Loading latest headlines…</span>
      </div>
    </div>
  </div>

  <!-- ─── TABS ────────────────────────────────────────────────── -->
  <div class="tabs-wrap">
    <div class="tabs">
      <button class="tab-btn active" data-tab="world" onclick="switchTab('world')">
        🌍 World <span class="tab-badge" id="world-count">—</span>
      </button>
      <button class="tab-btn" data-tab="india" onclick="switchTab('india')">
        🇮🇳 India <span class="tab-badge" id="india-count">—</span>
      </button>
      <button class="tab-btn" data-tab="tn" onclick="switchTab('tn')">
        🏛️ Tamil Nadu <span class="tab-badge" id="tn-count">—</span>
      </button>
    </div>
  </div>

  <!-- ─── MAIN ─────────────────────────────────────────────────── -->
  <main>
    <!-- WORLD -->
    <div class="tab-panel active" id="panel-world">
      <div class="section-header">
        <div class="section-dot world-dot"></div>
        <div class="section-title">World News</div>
        <span class="live-dot">LIVE</span>
      </div>
      <div class="news-grid" id="grid-world"></div>
    </div>

    <!-- INDIA -->
    <div class="tab-panel" id="panel-india">
      <div class="section-header">
        <div class="section-dot india-dot"></div>
        <div class="section-title">India News</div>
        <span class="live-dot">LIVE</span>
      </div>
      <div class="news-grid" id="grid-india"></div>
    </div>

    <!-- TAMIL NADU -->
    <div class="tab-panel" id="panel-tn">
      <div class="section-header">
        <div class="section-dot tn-dot"></div>
        <div class="section-title">Tamil Nadu News</div>
        <span class="live-dot">LIVE</span>
      </div>
      <div class="news-grid" id="grid-tn"></div>
    </div>
  </main>

  <!-- ─── INSTALL BANNER ──────────────────────────────────────── -->
  <div id="install-banner">
    <div class="install-icon">📲</div>
    <div class="install-text">
      <h4>Install NewsNow App</h4>
      <p>Get notifications & faster loading</p>
    </div>
    <div class="install-actions">
      <button class="btn-install" id="install-btn">Install</button>
      <button class="btn-dismiss" onclick="dismissInstall()">✕</button>
    </div>
  </div>

  <!-- ─── TOAST ────────────────────────────────────────────────── -->
  <div id="toast"></div>

  <script>
    // ─── CONFIG ────────────────────────────────────────────────────
    const RSS2JSON = 'https://api.rss2json.com/v1/api.json?rss_url=';
    const FEEDS = {
      world: [
        'https://feeds.bbci.co.uk/news/world/rss.xml',
        'https://rss.nytimes.com/services/xml/rss/nyt/World.xml',
        'https://www.theguardian.com/world/rss',
      ],
      india: [
        'https://feeds.feedburner.com/ndtvnews-india-news',
        'https://timesofindia.indiatimes.com/rssfeeds/-2128936835.cms',
        'https://www.thehindu.com/news/national/feeder/default.rss',
        'https://www.hindustantimes.com/feeds/rss/india-news/rssfeed.xml',
        'https://indianexpress.com/section/india/feed/',
      ],
      tn: [
        'https://news.google.com/rss/search?q=Tamil+Nadu+news&hl=en-IN&gl=IN&ceid=IN:en',
        'https://news.google.com/rss/search?q=TamilNadu+latest&hl=ta&gl=IN&ceid=IN:ta',
        'https://www.thehindu.com/news/national/tamil-nadu/feeder/default.rss',
      ]
    };
    const REFRESH_INTERVAL = 15 * 60 * 1000; // 15 minutes
    let allNews = { world: [], india: [], tn: [] };
    let deferredInstallPrompt = null;

    // ─── SKELETON LOADER ────────────────────────────────────────────
    function renderSkeletons(gridId) {
      const g = document.getElementById(gridId);
      g.innerHTML = `
        <div class="skel-hero">
          <div class="skel-img skeleton"></div>
          <div class="skel-body">
            <div class="skel-tag skeleton"></div>
            <div class="skel-title skeleton"></div>
            <div class="skel-title2 skeleton"></div>
            <div class="skel-line skeleton"></div>
            <div class="skel-line skeleton" style="width:80%"></div>
          </div>
        </div>
        ${[1,2,3,4].map(() => `
          <div class="skel-small">
            <div class="skel-body">
              <div class="skel-line skeleton" style="height:16px;margin-bottom:8px"></div>
              <div class="skel-line skeleton" style="width:70%"></div>
            </div>
            <div class="skeleton" style="width:100px"></div>
          </div>
        `).join('')}
      `;
    }

    // ─── FETCH SINGLE RSS FEED ──────────────────────────────────────
    async function fetchFeed(url) {
      try {
        const r = await fetch(`${RSS2JSON}${encodeURIComponent(url)}`);
        const d = await r.json();
        if (d.status !== 'ok') return [];
        return (d.items || []).map(item => ({
          title:      cleanText(item.title || ''),
          summary:    cleanText(item.description || item.content || ''),
          image:      item.enclosure?.link || item.thumbnail || extractImage(item.description || ''),
          source:     d.feed?.title || 'News',
          url:        item.link || '#',
          pubDate:    item.pubDate || '',
          id:         item.guid || item.link || item.title,
        })).filter(a => a.title && a.title !== '[Removed]');
      } catch { return []; }
    }

    function cleanText(html) {
      const el = document.createElement('div');
      el.innerHTML = html;
      return (el.textContent || el.innerText || '').trim().replace(/\s+/g, ' ');
    }

    function extractImage(html) {
      const m = html.match(/<img[^>]+src=["']([^"']+)["']/i);
      return m ? m[1] : '';
    }

    // ─── FETCH CATEGORY (all feeds in parallel, last 7 days) ────────
    async function fetchCategory(category) {
      const feeds = FEEDS[category];
      // Fetch all feeds in parallel
      const results = await Promise.all(feeds.map(url => fetchFeed(url)));

      // Merge and deduplicate by title
      let articles = [];
      const seen = new Set();
      for (const items of results) {
        for (const item of items) {
          const key = item.title.toLowerCase();
          if (!seen.has(key)) {
            seen.add(key);
            articles.push(item);
          }
        }
      }

      // Filter to last 7 days (keep undated articles too)
      const oneWeekAgo = Date.now() - 7 * 24 * 60 * 60 * 1000;
      articles = articles.filter(a => {
        if (!a.pubDate) return true;
        const t = new Date(a.pubDate).getTime();
        return isNaN(t) || t >= oneWeekAgo;
      });

      // Sort newest first
      articles.sort((a, b) => {
        const da = a.pubDate ? new Date(a.pubDate).getTime() : 0;
        const db = b.pubDate ? new Date(b.pubDate).getTime() : 0;
        return db - da;
      });

      return articles;
    }

    // ─── RENDER ARTICLES ────────────────────────────────────────────
    function timeAgo(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr);
      if (isNaN(d)) return '';
      const diff = (Date.now() - d.getTime()) / 1000;
      if (diff < 60)        return 'Just now';
      if (diff < 3600)      return `${Math.floor(diff/60)}m ago`;
      if (diff < 86400)     return `${Math.floor(diff/3600)}h ago`;
      return `${Math.floor(diff/86400)}d ago`;
    }

    function isNew(dateStr) {
      if (!dateStr) return false;
      const diff = (Date.now() - new Date(dateStr).getTime()) / 1000;
      return diff < 3600; // less than 1 hour
    }

    function renderCard(article, index, tagClass, emoji) {
      const isHero = index === 0;
      const ago    = timeAgo(article.pubDate);
      const fresh  = isNew(article.pubDate);
      const summary = article.summary.slice(0, 200) + (article.summary.length > 200 ? '…' : '');

      if (isHero) {
        return `
          <a class="card-hero" href="${article.url}" target="_blank" rel="noopener">
            ${article.image
              ? `<img class="card-img" src="${article.image}" alt="" loading="lazy" onerror="this.parentElement.querySelector('.card-img-placeholder').style.display='flex';this.remove()" />`
              : ''
            }
            <div class="card-img-placeholder" style="${article.image ? 'display:none' : ''}">${emoji}</div>
            <div class="card-body">
              <span class="card-tag ${tagClass}">${fresh ? '🔴 Breaking' : 'Top Story'}</span>
              <div class="card-title">${article.title}</div>
              <div class="card-summary">${summary}</div>
              <div class="card-meta">
                <span class="card-source">${article.source}</span>
                ${fresh ? '<span class="new-badge">NEW</span>' : ''}
                <span class="card-time">${ago}</span>
              </div>
            </div>
          </a>`;
      } else {
        return `
          <a class="card-small" href="${article.url}" target="_blank" rel="noopener">
            <div class="card-body">
              <div class="card-title">${article.title}</div>
              <div class="card-summary">${summary}</div>
              <div class="card-meta">
                <span class="card-source">${article.source}</span>
                ${fresh ? '<span class="new-badge">NEW</span>' : ''}
                <span class="card-time">${ago}</span>
              </div>
            </div>
            ${article.image
              ? `<img class="card-thumb" src="${article.image}" alt="" loading="lazy" onerror="this.style.display='none'" />`
              : `<div class="card-thumb-placeholder">${emoji}</div>`
            }
          </a>`;
      }
    }

    function renderGrid(category) {
      const configs = {
        world: { grid: 'grid-world', count: 'world-count', tag: 'world-tag', emoji: '🌍' },
        india: { grid: 'grid-india', count: 'india-count', tag: 'india-tag', emoji: '🇮🇳' },
        tn:    { grid: 'grid-tn',    count: 'tn-count',    tag: 'tn-tag',    emoji: '🏛️' },
      };
      const { grid, count, tag, emoji } = configs[category];
      const articles = allNews[category];
      const g = document.getElementById(grid);

      if (!articles.length) {
        g.innerHTML = `
          <div class="error-state">
            <div class="icon">📡</div>
            <h3>Could not load news</h3>
            <p>Check your internet connection and try again</p>
            <button class="retry-btn" onclick="loadCategory('${category}')">Try Again</button>
          </div>`;
        document.getElementById(count).textContent = '0';
        return;
      }

      g.innerHTML = articles
        .map((a, i) => renderCard(a, i, tag, emoji))
        .join('');
      document.getElementById(count).textContent = articles.length;
    }

    // ─── TICKER ─────────────────────────────────────────────────────
    function updateTicker() {
      const all = [...allNews.world, ...allNews.india, ...allNews.tn]
        .sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate))
        .slice(0, 12);
      if (!all.length) return;
      const ticker = document.getElementById('ticker-content');
      ticker.innerHTML = all.map(a =>
        `<span class="ticker-item"><span>${a.title}</span></span>`
      ).join('') + all.map(a =>
        `<span class="ticker-item"><span>${a.title}</span></span>`
      ).join(''); // duplicate for seamless loop
    }

    // ─── LOAD SINGLE CATEGORY ───────────────────────────────────────
    async function loadCategory(category) {
      renderSkeletons(`grid-${category}`);
      const articles = await fetchCategory(category);

      // Notification check
      const prevTop = localStorage.getItem(`top_${category}`);
      if (articles.length && prevTop !== articles[0]?.id) {
        if (prevTop && Notification.permission === 'granted') {
          const label = { world: '🌍 World', india: '🇮🇳 India', tn: '🏛️ Tamil Nadu' }[category];
          showNotification(`${label} — New Story`, articles[0].title, articles[0].url);
        }
        localStorage.setItem(`top_${category}`, articles[0]?.id || '');
      }

      allNews[category] = articles;
      renderGrid(category);
    }

    // ─── REFRESH ALL ─────────────────────────────────────────────────
    async function refreshAll() {
      const btn = document.getElementById('refresh-btn');
      btn.classList.add('spinning');
      await Promise.all(['world', 'india', 'tn'].map(c => loadCategory(c)));
      updateTicker();
      btn.classList.remove('spinning');
      const now = new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
      document.getElementById('last-updated').textContent = `Updated ${now}`;
      showToast('✅ News refreshed!');
    }

    // ─── TAB SWITCHING ───────────────────────────────────────────────
    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === `panel-${tab}`));
    }

    // ─── NOTIFICATIONS ───────────────────────────────────────────────
    async function requestNotifications() {
      if (!('Notification' in window)) {
        showToast('❌ Notifications not supported in this browser');
        return;
      }
      const result = await Notification.requestPermission();
      const btn = document.getElementById('notif-btn');
      if (result === 'granted') {
        btn.textContent = '✅ Notifications On';
        btn.classList.add('granted');
        showToast('🔔 Notifications enabled!');
        // Register service worker for background notifications
        registerServiceWorker();
      } else {
        showToast('❌ Notifications blocked — please enable in browser settings');
      }
    }

    function showNotification(title, body, url) {
      if (Notification.permission !== 'granted') return;
      const n = new Notification(title, {
        body: body.slice(0, 120),
        icon: 'icon-192.png',
        badge: 'icon-192.png',
        tag: url,
        renotify: true,
      });
      n.onclick = () => { window.open(url, '_blank'); n.close(); };
    }

    // ─── SERVICE WORKER ──────────────────────────────────────────────
    async function registerServiceWorker() {
      if (!('serviceWorker' in navigator)) return;
      try {
        const reg = await navigator.serviceWorker.register('sw.js');
        console.log('SW registered:', reg.scope);
      } catch (e) {
        console.log('SW registration failed:', e);
      }
    }

    // ─── PWA INSTALL ─────────────────────────────────────────────────
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredInstallPrompt = e;
      if (!localStorage.getItem('install_dismissed')) {
        document.getElementById('install-banner').classList.add('show');
      }
    });

    document.getElementById('install-btn').addEventListener('click', async () => {
      if (!deferredInstallPrompt) return;
      deferredInstallPrompt.prompt();
      const { outcome } = await deferredInstallPrompt.userChoice;
      if (outcome === 'accepted') {
        dismissInstall();
        showToast('🎉 App installed! You\'ll get live notifications.');
      }
      deferredInstallPrompt = null;
    });

    function dismissInstall() {
      document.getElementById('install-banner').classList.remove('show');
      localStorage.setItem('install_dismissed', '1');
    }

    // ─── TOAST ───────────────────────────────────────────────────────
    let toastTimer;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
    }

    // ─── NOTIFICATION BUTTON STATE ────────────────────────────────────
    function updateNotifBtn() {
      const btn = document.getElementById('notif-btn');
      if (Notification.permission === 'granted') {
        btn.textContent = '✅ Notifications On';
        btn.classList.add('granted');
      }
    }

    // ─── INIT ────────────────────────────────────────────────────────
    async function init() {
      updateNotifBtn();
      registerServiceWorker();
      await refreshAll();
      // Auto-refresh every 15 minutes while tab is open
      setInterval(refreshAll, REFRESH_INTERVAL);
    }

    // Pull to refresh on mobile
    let touchStartY = 0;
    document.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; });
    document.addEventListener('touchend', e => {
      if (window.scrollY === 0 && e.changedTouches[0].clientY - touchStartY > 80) {
        refreshAll();
      }
    });

    window.addEventListener('load', init);
    // Refresh when tab regains focus
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) refreshAll();
    });
  </script>
</body>
</html>
